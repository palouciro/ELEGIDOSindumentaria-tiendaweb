services:
  - type: web
    name: elegidos-indumentaria
    env: python
    buildCommand: pip install -r requirements.txt && python -c "from app import init_db; init_db()"
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: elegidos-db
          property: connectionString

databases:
  - name: elegidos-db
    plan: free
